name: Temporary Fly CTF Retrieval

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  retrieve:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install browser tools
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium --with-deps

      - name: Inspect Proton Drive share
        env:
          SHARE_URL: 'https://drive.proton.me/urls/E73WE0CN2C#FscRsttW3OYJ'
        run: |
          cat > retrieve.py <<'PY'
          import asyncio, json, os, traceback
          from pathlib import Path
          from playwright.async_api import async_playwright

          OUT = Path('ctf_fly_output')
          OUT.mkdir(exist_ok=True)
          URL = os.environ['SHARE_URL']

          async def main():
              logs = {'console': [], 'requests': [], 'responses': [], 'errors': [], 'elements': []}
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  context = await browser.new_context(accept_downloads=True, viewport={'width': 1440, 'height': 1000})
                  page = await context.new_page()
                  page.on('console', lambda m: logs['console'].append(f'{m.type}: {m.text}'))
                  page.on('pageerror', lambda e: logs['errors'].append(str(e)))
                  page.on('request', lambda r: logs['requests'].append({'method':r.method,'resource':r.resource_type,'url':r.url}) if len(logs['requests']) < 1500 else None)
                  page.on('response', lambda r: logs['responses'].append({'status':r.status,'url':r.url,'content_type':r.headers.get('content-type','')}) if len(logs['responses']) < 1500 else None)
                  await page.goto(URL, wait_until='domcontentloaded', timeout=120000)
                  await page.wait_for_timeout(20000)
                  await page.screenshot(path=str(OUT/'page.png'), full_page=True)
                  (OUT/'page.html').write_text(await page.content(), encoding='utf-8')
                  (OUT/'body.txt').write_text(await page.locator('body').inner_text(), encoding='utf-8')
                  els = page.locator('button, a, [role="button"], input, [data-testid]')
                  for i in range(min(await els.count(), 1000)):
                      el = els.nth(i)
                      try:
                          logs['elements'].append({
                              'i': i,
                              'tag': await el.evaluate('(e)=>e.tagName'),
                              'visible': await el.is_visible(),
                              'text': (await el.inner_text()).strip()[:500],
                              'aria': await el.get_attribute('aria-label'),
                              'title': await el.get_attribute('title'),
                              'href': await el.get_attribute('href'),
                              'download': await el.get_attribute('download'),
                              'testid': await el.get_attribute('data-testid'),
                              'class': (await el.get_attribute('class') or '')[:500],
                              'outer': (await el.evaluate('(e)=>e.outerHTML'))[:1500]
                          })
                      except Exception as e:
                          logs['errors'].append(f'element {i}: {e}')
                  logs['url_final'] = page.url
                  logs['title'] = await page.title()
                  (OUT/'diagnostics.json').write_text(json.dumps(logs, indent=2, ensure_ascii=False), encoding='utf-8')
                  await browser.close()

          try:
              asyncio.run(main())
          except Exception:
              (OUT/'fatal.txt').write_text(traceback.format_exc(), encoding='utf-8')
              raise
          PY
          python retrieve.py
          find ctf_fly_output -maxdepth 2 -type f -printf '%f\t%s bytes\n' | tee ctf_fly_output/files.txt

      - name: Upload retrieval artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctf-fly-diagnostics
          path: ctf_fly_output/
          if-no-files-found: error
          retention-days: 1

      - name: Post run details
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY=$(printf 'Temporary diagnostics completed.\n\nRun ID: `%s`\n\nFiles:\n```\n%s\n```' "$GITHUB_RUN_ID" "$(cat ctf_fly_output/files.txt 2>/dev/null || true)")
          gh issue comment 1 --repo NetKingJ/NKHashing --body "$BODY"
